<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Little Prince</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0618;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    font-family: 'Cormorant Garamond', serif;
  }
  canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
  #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
  #title {
    position: absolute; top: 22px; left: 50%; transform: translateX(-50%);
    text-align: center; color: #f5e6c0; letter-spacing: 0.3em;
    font-family: 'Cinzel', serif; font-size: 14px; font-weight: 400; opacity: 0.75;
  }
  #hint {
    position: absolute; bottom: 26px; left: 50%; transform: translateX(-50%);
    color: #c9a96e; font-size: 14px; font-style: italic; opacity: 0.65;
    text-align: center; animation: pulse 3s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:0.35} 50%{opacity:0.8} }

  #letter-overlay {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    pointer-events: none; opacity: 0; transition: opacity 0.5s; z-index: 100;
  }
  #letter-overlay.visible { opacity: 1; pointer-events: all; }
  #letter-bg {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(5,3,18,0.82); backdrop-filter: blur(6px);
  }
  #letter-card {
    position: relative; width: min(430px, 88vw);
    background: linear-gradient(160deg, #fdf6e3 0%, #f7e8c0 60%, #eedfa8 100%);
    border-radius: 2px; padding: 50px 48px 40px;
    box-shadow: 0 0 80px rgba(197,160,80,0.3), 0 20px 60px rgba(0,0,0,0.6);
    transform: translateY(30px) rotate(-1deg) scale(0.85);
    transition: transform 0.65s cubic-bezier(0.34,1.56,0.64,1), opacity 0.65s;
    opacity: 0; cursor: pointer;
  }
  #letter-overlay.visible #letter-card {
    transform: translateY(0) rotate(-0.5deg) scale(1);
    opacity: 1; transition-delay: 0.15s;
  }
  #letter-seal {
    position: absolute; top: -24px; left: 50%; transform: translateX(-50%);
    width: 48px; height: 48px;
  }
  #letter-card h2 {
    font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: 0.32em;
    color: #8b6914; text-align: center; margin-bottom: 26px;
    padding-bottom: 16px; border-bottom: 0.5px solid rgba(139,105,20,0.3);
  }
  #letter-card p {
    font-family: 'Cormorant Garamond', serif; font-size: 21px;
    line-height: 1.8; color: #3a2a08; font-style: italic; text-align: center; font-weight: 300;
  }
  #letter-card .signature {
    margin-top: 22px; text-align: right; font-size: 15px;
    color: #8b6914; font-style: italic; letter-spacing: 0.05em;
  }
  #letter-card .close-hint {
    margin-top: 18px; text-align: center; font-size: 11px;
    color: #c9a55a; letter-spacing: 0.18em; font-style: normal; opacity: 0.7;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <div id="title">✦ THE LITTLE PRINCE ✦</div>
  <div id="hint">натисни на троянду</div>
</div>
<div id="letter-overlay">
  <div id="letter-bg"></div>
  <div id="letter-card" onclick="closeLetter()">
    <svg id="letter-seal" viewBox="0 0 48 48">
      <circle cx="24" cy="24" r="22" fill="#c9a030" stroke="#8b6914" stroke-width="1"/>
      <circle cx="24" cy="24" r="17" fill="none" stroke="#8b6914" stroke-width="0.5"/>
      <text x="24" y="21" text-anchor="middle" font-size="10" fill="#3a2a08" font-family="Cinzel,serif" font-weight="600">LP</text>
      <path d="M17 27 Q24 22 31 27" fill="none" stroke="#3a2a08" stroke-width="0.9"/>
      <circle cx="24" cy="31" r="1.4" fill="#3a2a08"/>
    </svg>
    <h2>ЛИСТІВКА ВІД МАЛЕНЬКОГО ПРИНЦА</h2>
    <p>Любов — це знайти в комусь свою маленьку планету.</p>
    <div class="signature">— Le Petit Prince</div>
    <div class="close-hint">натисни, щоб закрити</div>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, dpr, tick=0, roseHovered=false, roseGlowAnim=0;
let roseRect={x:0,y:0,r:0}, shootingStars=[], nextShoot=120;

function resize(){
  dpr=window.devicePixelRatio||1;
  W=canvas.offsetWidth; H=canvas.offsetHeight;
  canvas.width=W*dpr; canvas.height=H*dpr;
  ctx.scale(dpr,dpr);
}
window.addEventListener('resize',resize); resize();

const NUM_STARS=240;
const stars=Array.from({length:NUM_STARS},()=>({
  x:Math.random(), y:Math.random()*0.85,
  r:Math.random()*1.5+0.3, speed:Math.random()*0.008+0.003,
  phase:Math.random()*Math.PI*2
}));

function drawStars(t){
  for(const s of stars){
    const a=0.4+0.6*Math.abs(Math.sin(s.phase+t*s.speed));
    ctx.beginPath(); ctx.arc(s.x*W,s.y*H,s.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(245,230,192,${a})`; ctx.fill();
  }
}
function drawShootingStars(t){
  nextShoot--;
  if(nextShoot<=0){
    shootingStars.push({x:Math.random()*W*.7+W*.1,y:Math.random()*H*.3,
      vx:(Math.random()*3+2)*(Math.random()<.5?1:-1),vy:Math.random()*2+1,life:1,trail:[]});
    nextShoot=180+Math.random()*200;
  }
  shootingStars=shootingStars.filter(s=>s.life>0);
  for(const s of shootingStars){
    s.trail.push({x:s.x,y:s.y});
    if(s.trail.length>12)s.trail.shift();
    s.x+=s.vx; s.y+=s.vy; s.life-=0.022;
    for(let i=0;i<s.trail.length;i++){
      const a=(i/s.trail.length)*s.life*.9;
      ctx.beginPath(); ctx.arc(s.trail[i].x,s.trail[i].y,1.2*(i/s.trail.length),0,Math.PI*2);
      ctx.fillStyle=`rgba(255,240,180,${a})`; ctx.fill();
    }
  }
}
function drawNebula(){
  let g=ctx.createRadialGradient(W*.5,H*.35,0,W*.5,H*.35,W*.45);
  g.addColorStop(0,'rgba(60,30,100,0.12)'); g.addColorStop(0.5,'rgba(30,10,60,0.07)'); g.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
}
function drawPlanet(t){
  const cx=W*.5, cy=H*.72, R=Math.min(W,H)*.17;
  let g=ctx.createRadialGradient(cx,cy+R*.3,R*.1,cx,cy,R*1.6);
  g.addColorStop(0,'rgba(100,160,80,0.18)'); g.addColorStop(0.5,'rgba(60,120,50,0.08)'); g.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=g; ctx.beginPath(); ctx.arc(cx,cy,R*1.7,0,Math.PI*2); ctx.fill();

  const p=ctx.createRadialGradient(cx-R*.2,cy-R*.2,R*.05,cx,cy,R);
  p.addColorStop(0,'#4a9e38'); p.addColorStop(.3,'#357a25'); p.addColorStop(.7,'#2a5e1c'); p.addColorStop(1,'#1a3d10');
  ctx.beginPath(); ctx.arc(cx,cy,R,0,Math.PI*2); ctx.fillStyle=p; ctx.fill();

  ctx.save(); ctx.beginPath(); ctx.arc(cx,cy,R,0,Math.PI*2); ctx.clip();
  ctx.globalAlpha=0.13; ctx.strokeStyle='#8fdf60'; ctx.lineWidth=R*.18;
  for(let i=-1;i<=1;i++){ctx.beginPath();ctx.ellipse(cx,cy+i*R*.35,R,R*.12,0,0,Math.PI*2);ctx.stroke();}
  ctx.globalAlpha=1; ctx.restore();

  ctx.save(); ctx.translate(cx,cy); ctx.scale(1,0.22);
  const ring=ctx.createLinearGradient(-R*1.7,0,R*1.7,0);
  ring.addColorStop(0,'rgba(180,140,60,0)'); ring.addColorStop(.2,'rgba(200,165,80,0.55)');
  ring.addColorStop(.5,'rgba(220,185,100,0.7)'); ring.addColorStop(.8,'rgba(200,165,80,0.55)'); ring.addColorStop(1,'rgba(180,140,60,0)');
  ctx.beginPath(); ctx.ellipse(0,0,R*1.65,R*1.65,0,Math.PI*.1,Math.PI*.9);
  ctx.strokeStyle=ring; ctx.lineWidth=R*.28; ctx.stroke(); ctx.restore();

  const term=ctx.createRadialGradient(cx+R*.4,cy-R*.1,0,cx,cy,R);
  term.addColorStop(.6,'rgba(0,0,0,0)'); term.addColorStop(1,'rgba(0,0,0,0.55)');
  ctx.beginPath(); ctx.arc(cx,cy,R,0,Math.PI*2); ctx.fillStyle=term; ctx.fill();
  return{cx,cy,R};
}
function drawPrince(cx,cy,R,t){
  const px=cx-R*.02, py=cy-R+4, sc=R*.011;
  ctx.save(); ctx.translate(px,py); ctx.scale(sc,sc);
  const bob=Math.sin(t*.04)*2.5; ctx.translate(0,bob);
  ctx.beginPath(); ctx.moveTo(-6,0); ctx.quadraticCurveTo(-20,15,-14,35); ctx.quadraticCurveTo(-8,42,-2,38); ctx.closePath(); ctx.fillStyle='#e8c030'; ctx.fill();
  ctx.beginPath(); ctx.roundRect(-10,0,20,36,[3]); ctx.fillStyle='#4a78d4'; ctx.fill();
  ctx.strokeStyle='#e8c030'; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(-10,8); ctx.lineTo(10,8); ctx.stroke();
  ctx.beginPath(); ctx.arc(0,14,2,0,Math.PI*2); ctx.fillStyle='#e8c030'; ctx.fill();
  ctx.fillStyle='#2a4a9a';
  ctx.beginPath(); ctx.roundRect(-7,34,6,14,[2]); ctx.fill();
  ctx.beginPath(); ctx.roundRect(1,34,6,14,[2]); ctx.fill();
  ctx.fillStyle='#1a2a50';
  ctx.beginPath(); ctx.roundRect(-8,46,7,5,[1]); ctx.fill();
  ctx.beginPath(); ctx.roundRect(0,46,7,5,[1]); ctx.fill();
  ctx.beginPath(); ctx.arc(0,-14,12,0,Math.PI*2); ctx.fillStyle='#f5d5a0'; ctx.fill();
  ctx.beginPath(); ctx.ellipse(0,-23,9,6,0,Math.PI,0); ctx.fillStyle='#d4a830'; ctx.fill();
  ctx.beginPath(); ctx.ellipse(-4,-20,4,3,-0.4,Math.PI,0); ctx.fillStyle='#d4a830'; ctx.fill();
  ctx.beginPath(); ctx.ellipse(4,-20,4,3,0.4,Math.PI,0); ctx.fillStyle='#d4a830'; ctx.fill();
  const ew=Math.sin(t*.02)>.92?.5:3;
  ctx.beginPath(); ctx.ellipse(-4,-13,2,ew,0,0,Math.PI*2); ctx.fillStyle='#2a1a08'; ctx.fill();
  ctx.beginPath(); ctx.ellipse(4,-13,2,3,0,0,Math.PI*2); ctx.fillStyle='#2a1a08'; ctx.fill();
  ctx.beginPath(); ctx.arc(0,-10,4,.1,Math.PI-.1); ctx.strokeStyle='#8b4a20'; ctx.lineWidth=1.5; ctx.stroke();
  ctx.restore();
}
function drawFox(cx,cy,R,t){
  const fx=cx+R*.55, fy=cy-R*.02, sc=R*.008;
  ctx.save(); ctx.translate(fx,fy); ctx.scale(-sc,sc);
  const walk=Math.sin(t*.05)*3; ctx.translate(0,walk);
  ctx.beginPath(); ctx.moveTo(20,10); ctx.quadraticCurveTo(55,-5,60,-30); ctx.quadraticCurveTo(65,-45,50,-40); ctx.quadraticCurveTo(45,-38,40,-28); ctx.quadraticCurveTo(35,-10,20,10); ctx.fillStyle='#d4601a'; ctx.fill();
  ctx.beginPath(); ctx.ellipse(52,-38,7,5,-0.5,0,Math.PI*2); ctx.fillStyle='#f5e0c0'; ctx.fill();
  ctx.beginPath(); ctx.ellipse(0,5,18,12,0,0,Math.PI*2); ctx.fillStyle='#d4601a'; ctx.fill();
  ctx.fillStyle='#b04010';
  ctx.beginPath(); ctx.roundRect(-14,14,6,12,[2]); ctx.fill();
  ctx.beginPath(); ctx.roundRect(-5,14,6,12,[2]); ctx.fill();
  ctx.beginPath(); ctx.roundRect(5,14,6,12,[2]); ctx.fill();
  ctx.beginPath(); ctx.roundRect(14,14,6,12,[2]); ctx.fill();
  ctx.beginPath(); ctx.ellipse(-14,-8,13,10,0.2,0,Math.PI*2); ctx.fillStyle='#d4601a'; ctx.fill();
  ctx.beginPath(); ctx.ellipse(-22,-5,7,5,0.1,0,Math.PI*2); ctx.fillStyle='#e8805a'; ctx.fill();
  ctx.beginPath(); ctx.ellipse(-26,-6,2.5,2,0,0,Math.PI*2); ctx.fillStyle='#3a1208'; ctx.fill();
  ctx.beginPath(); ctx.ellipse(-10,-12,3,3.5,0,0,Math.PI*2); ctx.fillStyle='#2a1a08'; ctx.fill();
  ctx.beginPath(); ctx.ellipse(-9,-13,1,1,0,0,Math.PI*2); ctx.fillStyle='rgba(255,255,255,0.5)'; ctx.fill();
  ctx.beginPath(); ctx.moveTo(-8,-16); ctx.lineTo(-4,-32); ctx.lineTo(2,-16); ctx.fillStyle='#d4601a'; ctx.fill();
  ctx.beginPath(); ctx.moveTo(-7,-18); ctx.lineTo(-4,-28); ctx.lineTo(0,-18); ctx.fillStyle='#8b2010'; ctx.fill();
  ctx.beginPath(); ctx.moveTo(-22,-16); ctx.lineTo(-20,-30); ctx.lineTo(-14,-18); ctx.fillStyle='#d4601a'; ctx.fill();
  ctx.beginPath(); ctx.moveTo(-21,-17); ctx.lineTo(-20,-26); ctx.lineTo(-15,-18); ctx.fillStyle='#8b2010'; ctx.fill();
  ctx.restore();
}
function drawDome(cx,cy,R,t){
  const dx=cx-R*.35, dy=cy-R+2, dr=R*.28, dh=dr*1.3;
  ctx.save();
  ctx.beginPath(); ctx.ellipse(dx,dy,dr,dh,0,Math.PI,0,true);
  const dg=ctx.createRadialGradient(dx-dr*.3,dy-dh*.4,1,dx,dy,dr*1.2);
  dg.addColorStop(0,'rgba(200,230,255,0.25)'); dg.addColorStop(.6,'rgba(180,210,255,0.08)'); dg.addColorStop(1,'rgba(140,180,230,0.15)');
  ctx.fillStyle=dg; ctx.fill();
  ctx.beginPath(); ctx.ellipse(dx-dr*.25,dy-dh*.55,dr*.22,dh*.18,-0.3,0,Math.PI*2); ctx.fillStyle='rgba(255,255,255,0.14)'; ctx.fill();
  ctx.beginPath(); ctx.ellipse(dx,dy,dr,dh,0,Math.PI,0,true); ctx.strokeStyle='rgba(180,220,255,0.45)'; ctx.lineWidth=1; ctx.stroke();
  ctx.beginPath(); ctx.ellipse(dx,dy,dr*1.05,dr*.18,0,0,Math.PI*2); ctx.fillStyle='rgba(100,180,80,0.5)'; ctx.fill();
  ctx.strokeStyle='rgba(80,160,60,0.7)'; ctx.lineWidth=0.8; ctx.stroke();
  ctx.restore();
  drawRose(dx,dy-dh*.35,dr*.6,t);
  roseRect={x:dx,y:dy-dh*.35,r:dr*.6};
}
function drawRose(rx,ry,rs,t){
  const hov=roseHovered;
  roseGlowAnim+=hov?.06:-.04; roseGlowAnim=Math.max(0,Math.min(1,roseGlowAnim));
  const glow=roseGlowAnim;
  if(glow>0){
    const g=ctx.createRadialGradient(rx,ry,0,rx,ry,rs*1.8*glow+rs*.3);
    g.addColorStop(0,`rgba(255,120,140,${.3*glow})`); g.addColorStop(1,'rgba(255,80,100,0)');
    ctx.beginPath(); ctx.arc(rx,ry,rs*2,0,Math.PI*2); ctx.fillStyle=g; ctx.fill();
  }
  ctx.save(); ctx.translate(rx,ry);
  const sc=rs*.028; ctx.scale(sc,sc);
  const sway=Math.sin(t*.03)*3; ctx.rotate(sway*.02);
  ctx.beginPath(); ctx.moveTo(0,20); ctx.quadraticCurveTo(-4,50,-2,90); ctx.strokeStyle='#3a7a28'; ctx.lineWidth=3.5; ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-2,60); ctx.quadraticCurveTo(-18,52,-20,40); ctx.quadraticCurveTo(-10,44,-2,55); ctx.fillStyle='#4a9a38'; ctx.fill();
  const cols=['#e8304a','#d01830','#f05060','#c01028','#e84060'];
  for(let i=0;i<5;i++){
    ctx.save(); ctx.rotate((i*72+sway)*Math.PI/180);
    ctx.beginPath(); ctx.ellipse(0,-16,8,14,0,0,Math.PI*2); ctx.fillStyle=cols[i%cols.length]; ctx.globalAlpha=.9; ctx.fill();
    ctx.restore();
  }
  ctx.beginPath(); ctx.arc(0,0,9,0,Math.PI*2);
  const cg=ctx.createRadialGradient(0,0,0,0,0,9); cg.addColorStop(0,'#ffb0b8'); cg.addColorStop(1,'#d01838');
  ctx.fillStyle=cg; ctx.globalAlpha=1; ctx.fill();
  if(hov) canvas.style.cursor='pointer';
  ctx.restore();
}
function draw(t){
  ctx.clearRect(0,0,W,H);
  const sky=ctx.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,'#050310'); sky.addColorStop(.5,'#0d0828'); sky.addColorStop(.8,'#0f1a3a'); sky.addColorStop(1,'#081408');
  ctx.fillStyle=sky; ctx.fillRect(0,0,W,H);
  drawNebula(); drawStars(t); drawShootingStars(t);
  const{cx,cy,R}=drawPlanet(t);
  drawDome(cx,cy,R,t); drawPrince(cx,cy,R,t); drawFox(cx,cy,R,t);
  if(!roseHovered) canvas.style.cursor='default';
}
function loop(){ tick++; draw(tick); requestAnimationFrame(loop); }
loop();

canvas.addEventListener('mousemove',e=>{
  const r=canvas.getBoundingClientRect();
  const dx=(e.clientX-r.left)-roseRect.x, dy=(e.clientY-r.top)-roseRect.y;
  roseHovered=Math.sqrt(dx*dx+dy*dy)<roseRect.r*1.4;
});
canvas.addEventListener('mouseleave',()=>roseHovered=false);
canvas.addEventListener('click',e=>{
  const r=canvas.getBoundingClientRect();
  const dx=(e.clientX-r.left)-roseRect.x, dy=(e.clientY-r.top)-roseRect.y;
  if(Math.sqrt(dx*dx+dy*dy)<roseRect.r*1.6) openLetter();
});
canvas.addEventListener('touchstart',e=>{
  const r=canvas.getBoundingClientRect();
  const t=e.touches[0];
  const dx=(t.clientX-r.left)-roseRect.x, dy=(t.clientY-r.top)-roseRect.y;
  if(Math.sqrt(dx*dx+dy*dy)<roseRect.r*2.5) openLetter();
},{passive:true});
function openLetter(){
  document.getElementById('letter-overlay').classList.add('visible');
  document.getElementById('hint').style.opacity='0';
}
function closeLetter(){
  document.getElementById('letter-overlay').classList.remove('visible');
  document.getElementById('hint').style.opacity='';
}
document.getElementById('letter-bg').addEventListener('click',closeLetter);
</script>
</body>
</html>
